<!DOCTYPE html>
<html>
<head>
    <title>Test Courses - Debug</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h2 { color: #333; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .test-btn { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .test-btn:hover { background: #0056b3; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Course Storage Debugger</h1>
        
        <h2>Test Results:</h2>
        <div id="results"></div>
        
        <h2>Actions:</h2>
        <button class="test-btn" onclick="testStorageManager()">Test StorageManager</button>
        <button class="test-btn" onclick="initializeDefaultCourses()">Initialize Default Courses</button>
        <button class="test-btn" onclick="showAllStorage()">Show All Storage</button>
        <button class="test-btn" onclick="clearAllCourses()">Clear Courses</button>
    </div>

    <script>
        // Copy StorageManager from main app
        const StorageManager = {
            get: (key, defaultValue = null) => {
                try {
                    const value = localStorage.getItem(key);
                    if (value === null) return defaultValue;
                    if (value === 'true') return true;
                    if (value === 'false') return false;
                    try {
                        return JSON.parse(value);
                    } catch (e) {
                        return value;
                    }
                } catch (e) {
                    console.error(`Error getting ${key}:`, e);
                    return defaultValue;
                }
            },

            set: (key, value) => {
                try {
                    if (value === null || value === undefined) {
                        localStorage.removeItem(key);
                    } else if (typeof value === 'object') {
                        localStorage.setItem(key, JSON.stringify(value));
                    } else if (typeof value === 'boolean') {
                        localStorage.setItem(key, value.toString());
                    } else {
                        localStorage.setItem(key, String(value));
                    }
                    return true;
                } catch (e) {
                    console.error(`Error setting ${key}:`, e);
                    return false;
                }
            }
        };

        function log(msg, isError = false) {
            const results = document.getElementById('results');
            const color = isError ? 'error' : 'success';
            results.innerHTML += `<p class="${color}">✓ ${msg}</p>`;
        }

        function testStorageManager() {
            document.getElementById('results').innerHTML = '';
            log('Testing StorageManager...');
            
            // Test set/get string
            StorageManager.set('test_string', 'hello');
            let val = StorageManager.get('test_string');
            log(`String test: "${val}" === "hello"? ${val === 'hello'}`);
            
            // Test set/get boolean
            StorageManager.set('test_bool', true);
            val = StorageManager.get('test_bool');
            log(`Boolean test: ${val} === true? ${val === true}`);
            
            // Test set/get object
            const obj = { id: 1, name: 'Test' };
            StorageManager.set('test_obj', obj);
            val = StorageManager.get('test_obj');
            log(`Object test: ${JSON.stringify(val)}`);
            
            log('StorageManager tests completed!');
        }

        function initializeDefaultCourses() {
            document.getElementById('results').innerHTML = '';
            const defaultCourses = [
                { id: 1, name: 'Skill Development', description: 'Learn professional skills', duration: 30 },
                { id: 2, name: 'Social Work', description: 'Community service training', duration: 30 },
                { id: 3, name: 'Population Study', description: 'Demographic research', duration: 30 },
                { id: 4, name: 'Disaster Management', description: 'Emergency response training', duration: 30 }
            ];
            
            StorageManager.set('adminCourses', defaultCourses);
            log('✓ Default courses initialized!');
            
            const retrieved = StorageManager.get('adminCourses');
            log(`Retrieved ${retrieved.length} courses from storage`);
            retrieved.forEach(c => log(`  - ${c.name}`));
        }

        function showAllStorage() {
            document.getElementById('results').innerHTML = '';
            log('All localStorage data:');
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                const displayValue = value.length > 100 ? value.substring(0, 100) + '...' : value;
                log(`${key}: ${displayValue}`);
            }
        }

        function clearAllCourses() {
            if (confirm('Clear all course data?')) {
                localStorage.removeItem('adminCourses');
                localStorage.removeItem('courseContent');
                document.getElementById('results').innerHTML = '';
                log('✓ Course data cleared!');
            }
        }

        // Auto-run tests on page load
        window.addEventListener('load', () => {
            testStorageManager();
            setTimeout(() => {
                const results = document.getElementById('results');
                results.innerHTML += '<hr>';
                log('Now initializing default courses...');
                initializeDefaultCourses();
            }, 500);
        });
    </script>
</body>
</html>
